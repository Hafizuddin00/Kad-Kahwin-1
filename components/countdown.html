<section id="countdown" class="countdown-section">
  <div class="countdown-bg-overlay" aria-hidden="true"></div>

  <div class="section-wrapper">
    <div class="section-title reveal">
      <span class="script-label">Menghitung Hari</span>
      <h2>Sehingga Diijabkabulkan</h2>
      <div class="divider"><span class="divider-icon">✦</span></div>
    </div>

    <div class="countdown-date-label reveal reveal-delay-1">
      24 Januari 2027
    </div>

    <!-- Timer Display -->
    <div class="countdown-timer reveal reveal-delay-2" id="countdown-timer" role="timer" aria-live="polite" aria-label="Countdown to wedding">
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-days">00</span>
        <span class="countdown-label">Hari</span>
      </div>
      <div class="countdown-separator" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-hours">00</span>
        <span class="countdown-label">Jam</span>
      </div>
      <div class="countdown-separator" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-minutes">00</span>
        <span class="countdown-label">Minit</span>
      </div>
      <div class="countdown-separator" aria-hidden="true">:</div>
      <div class="countdown-unit">
        <span class="countdown-num" id="cd-seconds">00</span>
        <span class="countdown-label">Saat</span>
      </div>
    </div>

    <!-- Married message (hidden until date passes) -->
    <div class="countdown-married hidden" id="countdown-married">
      <p class="married-icon" aria-hidden="true">💍</p>
      <p class="married-text">Akhirnya Bersatu — Kini Bergelar Suami Isteri</p>
    </div>

    <p class="countdown-sub reveal reveal-delay-3">
      Sinar bahagia ini lebih bermakna bersama anda.
    </p>
  </div>
</section>
